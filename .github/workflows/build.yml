name: Build FolkPatch

on:
  push:
    branches: [ main, develop ]
    paths: [ 'app/**', 'fpd/**', '.github/workflows/build.yml' ]
  pull_request:
    branches: [ main, develop ]
    paths: [ 'app/**', 'fpd/**', '.github/workflows/build.yml' ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'both'
        type: choice
        options: [ both, debug, release ]

env:
  KEYSTORE_FILE: debug.keystore
  KEYSTORE_PASSWORD: android
  KEY_ALIAS: androiddebugkey
  KEY_PASSWORD: android

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      build_debug: ${{ steps.set.outputs.debug }}
      build_release: ${{ steps.set.outputs.release }}
      commit_msg: ${{ steps.msg.outputs.text }}
      artifact_list: ${{ steps.set.outputs.artifact_list }}

    steps:
      - id: set
        run: |
          TYPE="${{ inputs.build_type }}"
          [ "${{ github.event_name }}" != "workflow_dispatch" ] && TYPE="both"

          DEBUG="false"; RELEASE="false"; LIST=""
          [ "$TYPE" = "both" -o "$TYPE" = "debug" ] && { DEBUG="true"; LIST="folkpatch-debug-${{ github.sha }}"; }
          [ "$TYPE" = "both" -o "$TYPE" = "release" ] && {
            RELEASE="true"
            [ -n "$LIST" ] && LIST="$LIST," || true
            LIST="${LIST}folkpatch-release-${{ github.sha }}"
          }

          echo "debug=$DEBUG" >> "$GITHUB_OUTPUT"
          echo "release=$RELEASE" >> "$GITHUB_OUTPUT"
          echo "artifact_list=$LIST" >> "$GITHUB_OUTPUT"

      - id: msg
        run: |
          case "${{ github.event_name }}" in
            push)         TEXT="${{ github.event.head_commit.message }}" ;;
            pull_request) TEXT="PR: ${{ github.event.pull_request.title }}" ;;
            *)            TEXT="FolkPatch Build" ;;
          esac
          echo "text=$TEXT" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    if: needs.prepare.outputs.build_debug == 'true' || needs.prepare.outputs.build_release == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - type: debug
            task: assembleDebug
            artifact_name: folkpatch-debug-${{ github.sha }}
            apk_prefix: FolkPatch-Debug
            apk_dir: debug
            enabled: ${{ needs.prepare.outputs.build_debug == 'true' }}
          - type: release
            task: assembleRelease
            artifact_name: folkpatch-release-${{ github.sha }}
            apk_prefix: FolkPatch-Release
            apk_dir: release
            enabled: ${{ needs.prepare.outputs.build_release == 'true' }}

    steps:
      - name: Skip disabled build type
        if: matrix.enabled != 'true'
        run: echo "Skipping ${{ matrix.type }} build" && exit 0

      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: ./.github/actions/setup-build-env

      - run: ./gradlew ${{ matrix.task }} --no-daemon

      - name: Rename APK
        run: |
          SHORT="${GITHUB_SHA::7}"
          mv app/build/outputs/apk/${{ matrix.apk_dir }}/*.apk "${{ matrix.apk_prefix }}-${SHORT}.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.apk_prefix }}-*.apk
          retention-days: 30

  upload:
    needs: [prepare, build]
    if: always() && needs.prepare.result == 'success' && (needs.build.jobs.debug.result == 'success' || needs.build.jobs.release.result == 'success') && github.actor != 'dependabot[bot]'
    uses: ./.github/workflows/CI_up.yml
    with:
      artifact_names: ${{ needs.prepare.outputs.artifact_list }}
      message: ${{ needs.prepare.outputs.commit_msg }}
    secrets: inherit
